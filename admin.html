<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Awareness by Art</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2699;</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    /* ─── Admin-specific overrides ─── */
    .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .admin-sidebar {
      background: var(--navy); color: white; padding: 0;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .admin-brand { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .admin-brand h2 { color: white; font-size: 1.1rem; margin-bottom: 2px; }
    .admin-brand p { color: rgba(255,255,255,0.4); font-size: 0.75rem; }
    .admin-nav { padding: 16px 0; flex: 1; }
    .admin-nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; color: rgba(255,255,255,0.55);
      font-weight: 500; font-size: 0.88rem; cursor: pointer;
      transition: all 0.2s ease; border-left: 3px solid transparent;
    }
    .admin-nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
    .admin-nav-item.active { color: white; background: rgba(46,107,122,0.25); border-left-color: var(--primary-light); font-weight: 700; }
    .admin-nav-item .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }
    .admin-nav-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.08); }
    .admin-main { background: var(--bg); padding: 32px; overflow-y: auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .admin-header h1 { font-size: 1.5rem; }
    .admin-stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .admin-stat {
      background: white; border-radius: var(--radius-lg); padding: 24px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
    }
    .admin-stat .label { color: var(--text-muted); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .admin-stat .value { font-family: var(--font-heading); font-size: 2rem; font-weight: 900; color: var(--navy); }
    .admin-stat .sub { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }
    .admin-stat.primary .value { color: var(--primary); }
    .admin-stat.gold .value { color: var(--gold); }
    .admin-stat.success .value { color: var(--success); }

    .admin-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); overflow: hidden; }
    .admin-card-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
    .admin-card-header h3 { font-size: 1rem; }
    .admin-card-body { padding: 24px; }
    .admin-card-body.flush { padding: 0; }

    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th { text-align: left; padding: 12px 16px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; background: var(--bg); border-bottom: 2px solid var(--border); white-space: nowrap; }
    .admin-table td { padding: 14px 16px; border-bottom: 1px solid var(--border-light); font-size: 0.88rem; color: var(--text-secondary); vertical-align: middle; }
    .admin-table tr:hover td { background: rgba(46,107,122,0.04); }
    .admin-table .actions { display: flex; gap: 6px; flex-wrap: nowrap; }

    .admin-filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .admin-search { padding: 10px 16px; border: 2px solid var(--border); border-radius: var(--radius-md); font-size: 0.88rem; background: white; min-width: 240px; outline: none; transition: border-color 0.2s; }
    .admin-search:focus { border-color: var(--primary); }

    .btn-xs { padding: 5px 10px; font-size: 0.75rem; border-radius: 6px; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #1aab4f; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-warning:hover { background: #d98b09; }
    .btn-danger { background: var(--error); color: white; }
    .btn-danger:hover { background: #d63131; }

    /* Login screen */
    .admin-login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--primary-dark) 100%);
    }
    .admin-login-box {
      background: white; border-radius: var(--radius-xl); padding: 48px;
      max-width: 420px; width: 100%; box-shadow: var(--shadow-xl);
    }

    /* Event form */
    .event-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 1024px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { position: fixed; left: -280px; z-index: 200; transition: left 0.3s; width: 260px; }
      .admin-sidebar.open { left: 0; }
      .admin-stat-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-mobile-toggle { display: block !important; }
    }
    @media (max-width: 600px) {
      .admin-stat-grid { grid-template-columns: 1fr; }
      .admin-main { padding: 16px; }
      .event-form-grid { grid-template-columns: 1fr; }
    }
    .admin-mobile-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 201; background: var(--navy); color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 1.3rem; box-shadow: var(--shadow-lg); }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="admin-login-screen" class="admin-login-screen">
  <div class="admin-login-box">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:2.5rem;margin-bottom:8px">&#9881;</div>
      <h2 style="margin-bottom:4px">Admin Panel</h2>
      <p style="color:var(--text-muted);font-size:0.88rem">Awareness by Art &mdash; Platform Management</p>
    </div>
    <div class="form-group">
      <label class="form-label" for="admin-email">Admin Email</label>
      <input id="admin-email" class="form-input" type="email" placeholder="admin@awarenessbyart.in" />
    </div>
    <div class="form-group">
      <label class="form-label" for="admin-pass">Password</label>
      <input id="admin-pass" class="form-input" type="password" placeholder="Enter admin password" />
    </div>
    <button class="form-submit" onclick="adminLogin()">Sign In to Admin</button>
    <p style="text-align:center;margin-top:20px">
      <a href="index.html" style="color:var(--primary);font-size:0.85rem;font-weight:600">&larr; Back to Main Site</a>
    </p>
  </div>
</div>

<!-- ADMIN LAYOUT (hidden until login) -->
<div id="admin-app" style="display:none">
  <button class="admin-mobile-toggle" onclick="document.querySelector('.admin-sidebar').classList.toggle('open')">&#9776;</button>
  <div class="admin-layout">
    <!-- Sidebar -->
    <div class="admin-sidebar">
      <div class="admin-brand">
        <h2>Awareness by Art</h2>
        <p>Admin Panel</p>
      </div>
      <div class="admin-nav">
        <div class="admin-nav-item active" data-tab="dashboard" onclick="switchAdminTab('dashboard')">
          <span class="nav-icon">&#128202;</span> Dashboard
        </div>
        <div class="admin-nav-item" data-tab="submissions" onclick="switchAdminTab('submissions')">
          <span class="nav-icon">&#128444;</span> Submissions
        </div>
        <div class="admin-nav-item" data-tab="results" onclick="switchAdminTab('results')">
          <span class="nav-icon">&#127942;</span> Declare Results
        </div>
        <div class="admin-nav-item" data-tab="users" onclick="switchAdminTab('users')">
          <span class="nav-icon">&#128101;</span> Users
        </div>
        <div class="admin-nav-item" data-tab="events" onclick="switchAdminTab('events')">
          <span class="nav-icon">&#128197;</span> Events
        </div>
      </div>
      <div class="admin-nav-footer">
        <a href="index.html" style="color:rgba(255,255,255,0.4);font-size:0.82rem;display:block;margin-bottom:12px">&larr; Back to Main Site</a>
        <button class="btn btn-outline btn-sm" style="width:100%;color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.15)" onclick="adminLogout()">Sign Out</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="admin-main" id="admin-main"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container" role="status" aria-live="polite"></div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
